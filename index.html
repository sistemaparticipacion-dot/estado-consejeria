<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Consejería - SDACP</title>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <img src="encabezado.png" alt="SCRD">
</header>

<div class="contenedor">

    <div class="tarjeta">
        <h1>Consulta tu Consejería</h1>
        <p>Verifica el estado de tu participación en el Sistema Distrital de Arte, Cultura y Patrimonio.</p>

        <img src="sistema.png" class="img-sistema">

        <ul>
            <li>Acceso a beneficios culturales</li>
            <li>Participación activa en el sector</li>
            <li>Certificación oficial inmediata</li>
        </ul>
    </div>

    <div class="tarjeta formulario">

        <label>Número de Documento</label>

        <input type="text" id="documento" placeholder="Ej: 12345678">

        <button id="btnConsultar" class="btn btn-consultar">
            CONSULTAR ESTADO
        </button>

        <div id="resBox" class="resultado"></div>

        <button id="btnCertificado" class="btn btn-pdf">
            DESCARGAR CERTIFICADO PDF
        </button>

    </div>

</div>

<footer>
    <img src="piedepagina1.png">
    <img src="piedepagina2.png">
</footer>

<script src="script.js"></script>
</body>
</html>
