<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Consejería - SDACP</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primario: #003366;
            --acento: #f1c40f;
            --fondo: #f4f7f9;
            --blanco: #ffffff;
            --texto: #333;
            --sombra: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primario);
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header img {
            max-width: 280px;
            height: auto;
        }

        .main-container {
            width: 95%;
            max-width: 1100px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            flex: 1;
        }

        @media (min-width: 850px) {
            .main-container { grid-template-columns: 1.5fr 1fr; }
        }

        .card {
            background: var(--blanco);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--sombra);
        }

        h1 { color: var(--primario); margin-bottom: 15px; font-size: 1.6rem; }
        h2 { color: var(--primario); margin: 20px 0 10px; font-size: 1.2rem; }

        .img-sistema {
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }

        ul { margin-left: 20px; margin-bottom: 15px; }
        li { margin-bottom: 8px; }

        /* Formulario de consulta */
        .search-box {
            position: sticky;
            top: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primario); }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus { outline: none; border-color: var(--primario); }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
